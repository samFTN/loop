<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop - Guitarisation™</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 15px;
  color: #333;
  min-height: 100vh;
}

.container { max-width: 900px; margin: 0 auto; }

header {
  text-align: center;
  color: white;
  margin-bottom: 30px;
  margin-top: 30px;
}

header h1 {
  font-size: 2.2em;
  font-weight: bold;
  line-height: 1.2;
  margin-bottom: 10px;
}

header .subtitle {
  font-size: 1.1em;
  opacity: 0.9;
}

.section {
  background: white;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 8px 15px rgba(0,0,0,0.15);
  margin-bottom: 20px;
}

.section h2 {
  color: #667eea;
  margin-bottom: 20px;
  font-size: 1.5em;
  border-bottom: 2px solid #667eea;
  padding-bottom: 8px;
  text-align: center;
}

.upload-zone {
  border: 2px dashed #667eea;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  background: rgba(102, 126, 234, 0.05);
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 15px;
}

.upload-zone:hover,
.upload-zone.dragover {
  background: rgba(102, 126, 234, 0.15);
  border-color: #764ba2;
  border-style: solid;
}

.upload-zone input[type="file"] { display: none; }

.upload-label {
  font-size: 1.1em;
  color: #667eea;
  font-weight: 600;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.import-actions {
  display: flex;
  justify-content: center;
  margin-bottom: 15px;
}

.record-btn {
  padding: 10px 28px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.record-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.record-btn.recording {
  background: linear-gradient(135deg, #ff4444, #cc0000);
  animation: pulse-rec 1.2s infinite;
}

@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.5); }
  50%       { box-shadow: 0 0 0 12px rgba(255,68,68,0); }
}

audio {
  width: 100%;
  margin-top: 10px;
  outline: none;
  border-radius: 10px;
}

/* ── Waveform trimmer ─────────────────────────────── */
.waveform-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 90px;
  background: #f5f7ff;
  border-radius: 10px;
  color: #aaa;
  font-style: italic;
  border: 2px dashed #ddd;
  margin-bottom: 15px;
  font-size: 0.95em;
}

.waveform-container {
  position: relative;
  width: 100%;
  height: 90px;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
  display: none;
  user-select: none;
  touch-action: none;
  background: #1a1a2e;
}

#waveformCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
}

/* ── Speed control ────────────────────────────────── */
.speed-control {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: #f5f7ff;
  padding: 12px 20px;
  border-radius: 10px;
  border: 1px solid #e0e6ff;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.speed-control label {
  font-weight: 600;
  color: #667eea;
  font-size: 0.95em;
  white-space: nowrap;
}

.speed-control input[type="range"] {
  width: 180px;
  accent-color: #667eea;
  cursor: pointer;
}

.speed-value {
  font-weight: bold;
  color: #333;
  min-width: 40px;
  text-align: center;
}

.speed-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.speed-preset {
  padding: 4px 10px;
  border: 1.5px solid #667eea;
  border-radius: 15px;
  background: white;
  color: #667eea;
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.speed-preset:hover,
.speed-preset.active {
  background: #667eea;
  color: white;
}

/* ── Precise inputs ───────────────────────────────── */
.precise-inputs {
  display: none;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 5px;
}

.precise-input-group {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f5f7ff;
  padding: 10px 16px;
  border-radius: 10px;
  border: 1px solid #e0e6ff;
}

.precise-input-group label {
  font-weight: 600;
  color: #667eea;
  font-size: 0.95em;
  white-space: nowrap;
}

.precise-input-group input[type="number"] {
  width: 85px;
  padding: 6px 8px;
  border: 1.5px solid #667eea;
  border-radius: 6px;
  text-align: center;
  font-size: 1em;
  color: #333;
  outline: none;
}

.precise-input-group input[type="number"]:focus {
  border-color: #764ba2;
  box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
}

.precise-input-group span {
  color: #667eea;
  font-weight: 600;
}

footer {
  text-align: center;
  color: white;
  margin-top: 30px;
  padding: 20px;
  opacity: 0.9;
}

footer p { margin: 5px 0; }

footer a {
  color: white;
  text-decoration: none;
  font-weight: 600;
}

footer a:hover { text-decoration: underline; }

@media (max-width: 768px) {
  body { padding: 10px; font-size: 0.9em; }
  header h1 { font-size: 1.8em; }
  .section { padding: 15px; }
  .waveform-container { height: 70px; }
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>Audio Loop</h1>
  <div class="subtitle">Guitarisation™</div>
</header>

<!-- ── Import ─────────────────────────────────────── -->
<div class="section">
  <h2>📁 Import</h2>

  <div class="upload-zone" id="uploadZone">
    <label class="upload-label">
      <span style="font-size:2em;">🎵</span>
      <span>Cliquez ou déposez un fichier audio / vidéo</span>
    </label>
    <input type="file" id="fileInput" accept="audio/*,video/*">
  </div>

  <div class="import-actions">
    <button class="record-btn" id="recordBtn">
      <span id="recordIcon">🎤</span>
      <span id="recordText">Enregistrer</span>
    </button>
  </div>

  <audio id="audioPlayer" controls></audio>
</div>

<!-- ── Réglages ───────────────────────────────────── -->
<div class="section">
  <h2>⚙️ Réglages</h2>

  <div class="waveform-placeholder" id="waveformPlaceholder">
    Importez un fichier pour voir la forme d'onde
  </div>

  <div class="waveform-container" id="waveformContainer">
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="speed-control" id="speedControl">
    <label>🎚️ Vitesse</label>
    <input type="range" id="speedSlider" min="0.25" max="2" step="0.05" value="1">
    <span class="speed-value" id="speedValue">1×</span>
    <div class="speed-presets">
      <button class="speed-preset" data-speed="0.5">0.5×</button>
      <button class="speed-preset" data-speed="0.75">0.75×</button>
      <button class="speed-preset active" data-speed="1">1×</button>
      <button class="speed-preset" data-speed="1.25">1.25×</button>
      <button class="speed-preset" data-speed="1.5">1.5×</button>
    </div>
  </div>

  <div class="precise-inputs" id="preciseInputs">
    <div class="precise-input-group">
      <label for="startInput">⏩ Début</label>
      <input type="number" id="startInput" min="0" step="0.01" value="0">
      <span>s</span>
    </div>
    <div class="precise-input-group">
      <label for="endInput">⏸️ Fin</label>
      <input type="number" id="endInput" min="0" step="0.01" value="0">
      <span>s</span>
    </div>
  </div>
</div>

<footer>
  <p>Samuel Ferton – École Guitarisation™</p>
  <p><a href="https://guitarschool.guitarisation.fr" target="_blank">guitarschool.guitarisation.fr</a></p>
  <p style="margin-top:10px; font-size:0.85em;">2026</p>
</footer>

</div>

<script>
// ── State ───────────────────────────────────────────
let audioCtx       = null;
let audioBuffer    = null;
let waveformPeaks  = null;
let duration       = 0;
let startTime      = 0;
let endTime        = 0;
let isDragging     = null; // 'start' | 'end' | null
let rafId          = null;
let mediaRecorder  = null;
let recordedChunks = [];

// ── Elements ────────────────────────────────────────
const fileInput          = document.getElementById('fileInput');
const audioPlayer        = document.getElementById('audioPlayer');
const uploadZone         = document.getElementById('uploadZone');
const recordBtn          = document.getElementById('recordBtn');
const recordIcon         = document.getElementById('recordIcon');
const recordText         = document.getElementById('recordText');
const placeholder        = document.getElementById('waveformPlaceholder');
const waveformContainer  = document.getElementById('waveformContainer');
const canvas             = document.getElementById('waveformCanvas');
const preciseInputs      = document.getElementById('preciseInputs');
const startInput         = document.getElementById('startInput');
const endInput           = document.getElementById('endInput');
const speedControl       = document.getElementById('speedControl');
const speedSlider        = document.getElementById('speedSlider');
const speedValue         = document.getElementById('speedValue');
const speedPresets       = document.querySelectorAll('.speed-preset');

// ── Load audio ──────────────────────────────────────
async function loadAudio(source) {
  const url = URL.createObjectURL(source);
  audioPlayer.src = url;
  audioPlayer.play().catch(() => {});

  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const ab = await source.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(ab);
  duration = audioBuffer.duration;

  // Auto-detect silence
  [startTime, endTime] = detectSilence(audioBuffer);

  // Show UI
  placeholder.style.display    = 'none';
  waveformContainer.style.display = 'block';
  speedControl.style.display   = 'flex';
  preciseInputs.style.display  = 'flex';

  setupCanvas();
  updateInputs();
  startRaf();
}

// ── Silence detection ───────────────────────────────
function detectSilence(buffer, threshold = 0.015) {
  const data = buffer.getChannelData(0);
  const len  = data.length;
  const sr   = buffer.sampleRate;
  let s = 0, e = len - 1;

  for (let i = 0; i < len; i++) {
    if (Math.abs(data[i]) > threshold) { s = i; break; }
  }
  for (let i = len - 1; i >= 0; i--) {
    if (Math.abs(data[i]) > threshold) { e = i; break; }
  }

  // Small padding
  const tStart = Math.max(0,        s / sr - 0.05);
  const tEnd   = Math.min(duration, e / sr + 0.05);
  return [tStart, tEnd];
}

// ── Waveform ────────────────────────────────────────
function setupCanvas() {
  canvas.width  = waveformContainer.offsetWidth;
  canvas.height = waveformContainer.offsetHeight;
  waveformPeaks = buildPeaks(audioBuffer, canvas.width);
}

function buildPeaks(buffer, numBars) {
  const data      = buffer.getChannelData(0);
  const blockSize = Math.floor(data.length / numBars);
  const peaks     = new Float32Array(numBars);
  let maxPeak     = 0;

  for (let i = 0; i < numBars; i++) {
    let max = 0;
    const off = i * blockSize;
    for (let j = 0; j < blockSize; j++) {
      const v = Math.abs(data[off + j]);
      if (v > max) max = v;
    }
    peaks[i] = max;
    if (max > maxPeak) maxPeak = max;
  }

  // Normalize so waveform fills the height
  if (maxPeak > 0) {
    for (let i = 0; i < numBars; i++) peaks[i] /= maxPeak;
  }
  return peaks;
}

function drawCanvas() {
  if (!waveformPeaks) return;
  const ctx = canvas.getContext('2d');
  const W   = canvas.width;
  const H   = canvas.height;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  const sx = Math.round((startTime / duration) * W);
  const ex = Math.round((endTime   / duration) * W);

  // Waveform bars
  const barW = W / waveformPeaks.length;
  for (let i = 0; i < waveformPeaks.length; i++) {
    const x    = i * barW;
    const barH = waveformPeaks[i] * H * 0.85;
    const y    = (H - barH) / 2;
    ctx.fillStyle = (x >= sx && x <= ex) ? '#667eea' : '#3a3a5c';
    ctx.fillRect(x, y, Math.max(barW - 1, 1), barH);
  }

  // Dim mask outside selection
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0,  0, sx,     H);
  ctx.fillRect(ex, 0, W - ex, H);

  // Selection top & bottom border
  ctx.strokeStyle = 'rgba(102,126,234,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx, 0); ctx.lineTo(ex, 0);
  ctx.moveTo(sx, H); ctx.lineTo(ex, H);
  ctx.stroke();

  // ── Start handle ──
  const g1 = ctx.createLinearGradient(sx - 6, 0, sx + 6, 0);
  g1.addColorStop(0,   'rgba(102,126,234,0)');
  g1.addColorStop(0.5, '#667eea');
  g1.addColorStop(1,   'rgba(102,126,234,0)');
  ctx.fillStyle = g1;
  ctx.fillRect(sx - 6, 0, 12, H);

  ctx.fillStyle = '#667eea';
  ctx.fillRect(sx - 5, 0,     10, 4);
  ctx.fillRect(sx - 5, H - 4, 10, 4);

  ctx.fillStyle = 'white';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('◀', sx, H / 2);

  // ── End handle ──
  const g2 = ctx.createLinearGradient(ex - 6, 0, ex + 6, 0);
  g2.addColorStop(0,   'rgba(118,75,162,0)');
  g2.addColorStop(0.5, '#764ba2');
  g2.addColorStop(1,   'rgba(118,75,162,0)');
  ctx.fillStyle = g2;
  ctx.fillRect(ex - 6, 0, 12, H);

  ctx.fillStyle = '#764ba2';
  ctx.fillRect(ex - 5, 0,     10, 4);
  ctx.fillRect(ex - 5, H - 4, 10, 4);

  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.fillText('▶', ex, H / 2);

  // ── Playhead ──
  if (duration > 0) {
    const px = Math.round((audioPlayer.currentTime / duration) * W);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(px - 1, 0, 2, H);

    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(px - 5, 0);
    ctx.lineTo(px + 5, 0);
    ctx.lineTo(px, 9);
    ctx.closePath();
    ctx.fill();
  }
}

function startRaf() {
  if (rafId) cancelAnimationFrame(rafId);
  function loop() {
    drawCanvas();
    rafId = requestAnimationFrame(loop);
  }
  loop();
}

// ── Inputs sync ─────────────────────────────────────
function updateInputs() {
  startInput.max   = duration.toFixed(2);
  endInput.max     = duration.toFixed(2);
  startInput.value = startTime.toFixed(2);
  endInput.value   = endTime.toFixed(2);
}

startInput.addEventListener('change', () => {
  let v = parseFloat(startInput.value);
  if (isNaN(v)) v = 0;
  startTime = Math.max(0, Math.min(v, endTime - 0.05));
  updateInputs();
});

endInput.addEventListener('change', () => {
  let v = parseFloat(endInput.value);
  if (isNaN(v)) v = duration;
  endTime = Math.min(duration, Math.max(v, startTime + 0.05));
  updateInputs();
});

// ── Canvas interaction ──────────────────────────────
function xToTime(x) {
  return Math.max(0, Math.min(duration, (x / canvas.width) * duration));
}

function hitTest(x) {
  const sx = (startTime / duration) * canvas.width;
  const ex = (endTime   / duration) * canvas.width;
  if (Math.abs(x - sx) < 14) return 'start';
  if (Math.abs(x - ex) < 14) return 'end';
  return null;
}

// Mouse
canvas.addEventListener('mousedown', (e) => {
  const x   = e.offsetX;
  const hit = hitTest(x);
  if (hit) {
    isDragging = hit;
  } else {
    audioPlayer.currentTime = Math.max(startTime, Math.min(endTime, xToTime(x)));
  }
});

canvas.addEventListener('mousemove', (e) => {
  const x = e.offsetX;
  if (isDragging) {
    const t = xToTime(x);
    if (isDragging === 'start') {
      startTime = Math.max(0,        Math.min(t, endTime - 0.05));
    } else {
      endTime   = Math.min(duration, Math.max(t, startTime + 0.05));
    }
    updateInputs();
  } else {
    canvas.style.cursor = hitTest(x) ? 'ew-resize' : 'pointer';
  }
});

canvas.addEventListener('mouseup',    () => { isDragging = null; });
canvas.addEventListener('mouseleave', () => { isDragging = null; });

// Touch
function touchX(e) {
  const rect = canvas.getBoundingClientRect();
  return (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const x   = touchX(e);
  const hit = hitTest(x);
  if (hit) {
    isDragging = hit;
  } else {
    audioPlayer.currentTime = Math.max(startTime, Math.min(endTime, xToTime(x)));
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDragging) return;
  const t = xToTime(touchX(e));
  if (isDragging === 'start') {
    startTime = Math.max(0,        Math.min(t, endTime - 0.05));
  } else {
    endTime   = Math.min(duration, Math.max(t, startTime + 0.05));
  }
  updateInputs();
}, { passive: false });

canvas.addEventListener('touchend', () => { isDragging = null; });

// ── File input ──────────────────────────────────────
uploadZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadAudio(file);
});

// ── Drag & drop ─────────────────────────────────────
uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});

uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('dragover');
});

uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadAudio(file);
});

// ── Recording ────────────────────────────────────────
recordBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  try {
    const stream   = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];

    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
    mediaRecorder  = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      recordBtn.classList.remove('recording');
      recordIcon.textContent = '🎤';
      recordText.textContent = 'Enregistrer';
      const blob = new Blob(recordedChunks, { type: mimeType });
      await loadAudio(blob);
    };

    mediaRecorder.start();
    recordBtn.classList.add('recording');
    recordIcon.textContent = '⏹';
    recordText.textContent = 'Arrêter';
  } catch {
    alert('Impossible d\'accéder au microphone. Vérifiez les autorisations.');
  }
});

// ── Loop playback ────────────────────────────────────
audioPlayer.addEventListener('timeupdate', () => {
  if (duration && audioPlayer.currentTime >= endTime) {
    audioPlayer.currentTime = startTime;
  }
});

audioPlayer.addEventListener('ended', () => {
  audioPlayer.currentTime = startTime;
  audioPlayer.play().catch(() => {});
});

// ── Speed control ────────────────────────────────────
function setSpeed(rate) {
  audioPlayer.playbackRate = rate;
  speedSlider.value = rate;
  speedValue.textContent = rate + '×';
  speedPresets.forEach(btn => {
    btn.classList.toggle('active', parseFloat(btn.dataset.speed) === rate);
  });
}

speedSlider.addEventListener('input', () => {
  const rate = parseFloat(speedSlider.value);
  setSpeed(rate);
});

speedPresets.forEach(btn => {
  btn.addEventListener('click', () => setSpeed(parseFloat(btn.dataset.speed)));
});

// ── Resize ───────────────────────────────────────────
window.addEventListener('resize', () => {
  if (audioBuffer) setupCanvas();
});
</script>

</body>
</html>
