<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop — Guitarisation™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:           #f5f5f3;
  --card:         #ffffff;
  --accent:       #d4a017;
  --accent-soft:  #fef9e3;
  --gold:         #e8c23a;
  --gold-hover:   #d4af30;
  --dark:         #111111;
  --text:         #1a1a1a;
  --muted:        #9ca3af;
  --muted2:       #6b7280;
  --border:       #e8e8e4;
  --border2:      #f0f0ec;
  --r:    22px;
  --r-sm: 11px;
  --r-xs:  8px;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  background-image: radial-gradient(
    ellipse 80% 60% at 50% 0%,
    rgba(255,255,255,0.85) 0%,
    transparent 70%
  );
  padding: 15px;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ──────────────────────────────────────────── */
header {
  width: 100%;
  max-width: 760px;
  padding: 10px 0 18px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}

.header-byline {
  font-size: 12px; font-weight: 500;
  color: var(--muted2); letter-spacing: 0.2px;
  justify-self: start;
}

.header-logo { justify-self: center; }
.header-logo img { height: 42px; width: auto; display: block; }

.header-logo-text {
  font-size: 22px; font-weight: 900;
  letter-spacing: -0.5px; color: var(--dark); line-height: 1;
}
.header-logo-text em { font-style: normal; color: var(--accent); }

.header-cta { justify-self: end; }

.btn-school {
  display: inline-block;
  padding: 10px 18px;
  border-radius: 10px;
  background: var(--gold);
  color: #fff;
  font-family: inherit; font-size: 13px; font-weight: 700;
  text-decoration: none; border: none; cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(232,194,58,0.35);
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s;
}
.btn-school:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(232,194,58,0.45);
  background: var(--gold-hover);
}
.btn-school:active { transform: translateY(0); }

.hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 36px; height: 36px; padding: 6px;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: var(--r-xs);
  cursor: pointer;
}
.hamburger span {
  display: block; height: 2px; border-radius: 2px;
  background: var(--dark); transition: background 0.15s;
}
.hamburger:hover span { background: var(--accent); }

.nav-dropdown {
  display: none;
  position: absolute; top: calc(100% + 8px); right: 0;
  background: white;
  border: 1.5px solid var(--border); border-radius: var(--r-sm);
  box-shadow: 0 12px 36px rgba(0,0,0,0.12);
  min-width: 220px; overflow: hidden; z-index: 100;
}
.nav-dropdown.open { display: block; }
.nav-dropdown a {
  display: block; padding: 14px 18px;
  font-size: 13px; font-weight: 600;
  color: var(--text); text-decoration: none;
  transition: background 0.1s;
}
.nav-dropdown a:hover { background: var(--border2); }
.nav-dropdown a::before { content: '→ '; color: var(--gold); }

/* ── Animations ──────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes flipFromLeft {
  from {
    opacity: 0;
    transform: perspective(900px) translateX(-70px) rotateY(-18deg);
  }
  to {
    opacity: 1;
    transform: perspective(900px) translateX(0) rotateY(0deg);
  }
}

.anim-header { animation: fadeIn       0.45s ease                               both; }
.anim-card   { animation: flipFromLeft 0.65s cubic-bezier(0.08, 0.92, 0.18, 1) 0.05s both; }

/* ── Main content ────────────────────────────────────── */
.main-content {
  width: 100%;
  max-width: 760px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.section {
  background: var(--card);
  border-radius: var(--r);
  padding: 25px;
  box-shadow:
    0 60px 120px rgba(0,0,0,0.10),
    0 20px 48px  rgba(0,0,0,0.07),
    0 4px  12px  rgba(0,0,0,0.04);
}

.section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 18px;
}

/* ── Upload zone ─────────────────────────────────────── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--r-sm);
  padding: 28px;
  text-align: center;
  background: var(--border2);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 14px;
}

.upload-zone:hover,
.upload-zone.dragover {
  background: var(--accent-soft);
  border-color: var(--accent);
  border-style: solid;
}

.upload-zone input[type="file"] { display: none; }

.upload-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted2);
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.upload-zone:hover .upload-label,
.upload-zone.dragover .upload-label { color: var(--accent); }

.import-actions {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}

.record-btn {
  padding: 10px 24px;
  border: none;
  border-radius: var(--r-xs);
  background: var(--dark);
  color: white;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

.record-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.22);
}

.record-btn.recording {
  background: var(--accent);
  box-shadow: 0 4px 14px rgba(212,160,23,0.35);
  animation: pulse-rec 1.2s infinite;
}

@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 0 0 0   rgba(212,160,23,0.4); }
  50%       { box-shadow: 0 0 0 10px rgba(212,160,23,0);   }
}

audio {
  width: 100%;
  margin-top: 10px;
  outline: none;
  border-radius: var(--r-xs);
}

/* ── Waveform trimmer ─────────────────────────────────── */
.waveform-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 90px;
  background: var(--border2);
  border-radius: var(--r-sm);
  color: var(--muted);
  font-style: italic;
  border: 1.5px dashed var(--border);
  margin-bottom: 15px;
  font-size: 13px;
  font-weight: 500;
}

.waveform-container {
  position: relative;
  width: 100%;
  height: 90px;
  border-radius: var(--r-sm);
  overflow: hidden;
  margin-bottom: 15px;
  display: none;
  user-select: none;
  touch-action: none;
  background: var(--dark);
}

#waveformCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
}

/* ── Speed control ────────────────────────────────────── */
.speed-control {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: var(--border2);
  padding: 12px 16px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.speed-control label {
  font-weight: 700;
  color: var(--muted2);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}

.speed-control input[type="range"] {
  width: 180px;
  accent-color: var(--accent);
  cursor: pointer;
}

.speed-value {
  font-weight: 700;
  color: var(--dark);
  min-width: 40px;
  text-align: center;
  font-size: 14px;
}

.speed-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.speed-preset {
  padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-xs);
  background: var(--card);
  color: var(--muted2);
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.12s;
}

.speed-preset:hover,
.speed-preset.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* ── Precise inputs ───────────────────────────────────── */
.precise-inputs {
  display: none;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 4px;
}

.precise-input-group {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--border2);
  padding: 10px 16px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
}

.precise-input-group label {
  font-weight: 700;
  color: var(--muted2);
  font-size: 12px;
  white-space: nowrap;
}

.precise-input-group input[type="number"] {
  width: 85px;
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-xs);
  text-align: center;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  color: var(--text);
  background: white;
  outline: none;
  transition: border-color 0.15s;
}

.precise-input-group input[type="number"]:focus,
.precise-input-group input[type="number"]:hover {
  border-color: var(--accent);
}

.precise-input-group span {
  color: var(--muted);
  font-weight: 600;
  font-size: 12px;
}

/* ── Footer ──────────────────────────────────────────── */
footer {
  width: 100%;
  max-width: 760px;
  margin-top: 20px;
  padding: 12px 0 6px;
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  border-top: 1px solid var(--border2);
}

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 640px) {
  header { padding: 10px 0 14px; grid-template-columns: 1fr auto 1fr; }
  .header-logo img { height: 32px; }
  .header-byline { font-size: 10px; }
  .btn-school { display: none; }
  .hamburger  { display: flex; }

  .section { padding: 18px; border-radius: var(--r-sm); }
  .waveform-container { height: 70px; }
}
</style>
</head>
<body>

<header class="anim-header">
  <div class="header-byline">par Samuel Ferton</div>

  <div class="header-logo">
    <img src="Logo Guitarisation.png" alt="Guitarisation™ — L'École de Guitare 2.0"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="header-logo-text" style="display:none">Guitar<em>isation</em>™</div>
  </div>

  <div class="header-cta" style="position:relative;">
    <a class="btn-school" href="https://guitarschool.guitarisation.fr/login"

    </a>
    <button class="hamburger" id="hamburgerBtn" onclick="toggleNav()" aria-label="Menu">

        Aller sur l'école Guitarisation™
      </a>
    </div>
  </div>
</header>

<div class="main-content anim-card">

<!-- ── Import ─────────────────────────────────────── -->
<div class="section">
  <div class="section-title">Import</div>

  <div class="upload-zone" id="uploadZone">
    <label class="upload-label">
      <span style="font-size:1.8em;">🎵</span>
      <span>Cliquez ou déposez un fichier audio / vidéo</span>
    </label>
    <input type="file" id="fileInput" accept="audio/*,video/*">
  </div>

  <div class="import-actions">
    <button class="record-btn" id="recordBtn">
      <span id="recordIcon">🎤</span>
      <span id="recordText">Enregistrer</span>
    </button>
  </div>

  <audio id="audioPlayer" controls></audio>
</div>

<!-- ── Réglages ───────────────────────────────────── -->
<div class="section">
  <div class="section-title">Réglages</div>

  <div class="waveform-placeholder" id="waveformPlaceholder">
    Importez un fichier pour voir la forme d'onde
  </div>

  <div class="waveform-container" id="waveformContainer">
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="speed-control" id="speedControl">
    <label>Vitesse</label>
    <input type="range" id="speedSlider" min="0.25" max="2" step="0.05" value="1">
    <span class="speed-value" id="speedValue">1×</span>
    <div class="speed-presets">
      <button class="speed-preset" data-speed="0.5">0.5×</button>
      <button class="speed-preset" data-speed="0.75">0.75×</button>
      <button class="speed-preset active" data-speed="1">1×</button>
      <button class="speed-preset" data-speed="1.25">1.25×</button>
      <button class="speed-preset" data-speed="1.5">1.5×</button>
    </div>
  </div>

  <div class="precise-inputs" id="preciseInputs">
    <div class="precise-input-group">
      <label for="startInput">Début</label>
      <input type="number" id="startInput" min="0" step="0.01" value="0">
      <span>s</span>
    </div>
    <div class="precise-input-group">
      <label for="endInput">Fin</label>
      <input type="number" id="endInput" min="0" step="0.01" value="0">
      <span>s</span>
    </div>
  </div>
</div>

</div><!-- /.main-content -->

<footer>
  © 2026 Guitarisation™ — L'École de Guitare 2.0 · par Samuel Ferton

<script>
// ── Nav ──────────────────────────────────────────────
function toggleNav() {
  document.getElementById('navDropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#hamburgerBtn') && !e.target.closest('#navDropdown')) {
    document.getElementById('navDropdown').classList.remove('open');
  }
});

// ── State ───────────────────────────────────────────
let audioCtx       = null;
let audioBuffer    = null;
let waveformPeaks  = null;
let duration       = 0;
let startTime      = 0;
let endTime        = 0;
let isDragging     = null; // 'start' | 'end' | null
let rafId          = null;
let mediaRecorder  = null;
let recordedChunks = [];

// ── Elements ────────────────────────────────────────
const fileInput          = document.getElementById('fileInput');
const audioPlayer        = document.getElementById('audioPlayer');
const uploadZone         = document.getElementById('uploadZone');
const recordBtn          = document.getElementById('recordBtn');
const recordIcon         = document.getElementById('recordIcon');
const recordText         = document.getElementById('recordText');
const placeholder        = document.getElementById('waveformPlaceholder');
const waveformContainer  = document.getElementById('waveformContainer');
const canvas             = document.getElementById('waveformCanvas');
const preciseInputs      = document.getElementById('preciseInputs');
const startInput         = document.getElementById('startInput');
const endInput           = document.getElementById('endInput');
const speedControl       = document.getElementById('speedControl');
const speedSlider        = document.getElementById('speedSlider');
const speedValue         = document.getElementById('speedValue');
const speedPresets       = document.querySelectorAll('.speed-preset');

// ── Load audio ──────────────────────────────────────
async function loadAudio(source) {
  const url = URL.createObjectURL(source);
  audioPlayer.src = url;
  audioPlayer.play().catch(() => {});

  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const ab = await source.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(ab);
  duration = audioBuffer.duration;

  // Auto-detect silence
  [startTime, endTime] = detectSilence(audioBuffer);

  // Show UI
  placeholder.style.display       = 'none';
  waveformContainer.style.display = 'block';
  speedControl.style.display      = 'flex';
  preciseInputs.style.display     = 'flex';

  setupCanvas();
  updateInputs();
  startRaf();
}

// ── Silence detection ───────────────────────────────
function detectSilence(buffer, threshold = 0.015) {
  const data = buffer.getChannelData(0);
  const len  = data.length;
  const sr   = buffer.sampleRate;
  let s = 0, e = len - 1;

  for (let i = 0; i < len; i++) {
    if (Math.abs(data[i]) > threshold) { s = i; break; }
  }
  for (let i = len - 1; i >= 0; i--) {
    if (Math.abs(data[i]) > threshold) { e = i; break; }
  }

  const tStart = Math.max(0,        s / sr - 0.05);
  const tEnd   = Math.min(duration, e / sr + 0.05);
  return [tStart, tEnd];
}

// ── Waveform ────────────────────────────────────────
function setupCanvas() {
  canvas.width  = waveformContainer.offsetWidth;
  canvas.height = waveformContainer.offsetHeight;
  waveformPeaks = buildPeaks(audioBuffer, canvas.width);
}

function buildPeaks(buffer, numBars) {
  const data      = buffer.getChannelData(0);
  const blockSize = Math.floor(data.length / numBars);
  const peaks     = new Float32Array(numBars);
  let maxPeak     = 0;

  for (let i = 0; i < numBars; i++) {
    let max = 0;
    const off = i * blockSize;
    for (let j = 0; j < blockSize; j++) {
      const v = Math.abs(data[off + j]);
      if (v > max) max = v;
    }
    peaks[i] = max;
    if (max > maxPeak) maxPeak = max;
  }

  if (maxPeak > 0) {
    for (let i = 0; i < numBars; i++) peaks[i] /= maxPeak;
  }
  return peaks;
}

function drawCanvas() {
  if (!waveformPeaks) return;
  const ctx = canvas.getContext('2d');
  const W   = canvas.width;
  const H   = canvas.height;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, W, H);

  const sx = Math.round((startTime / duration) * W);
  const ex = Math.round((endTime   / duration) * W);

  // Waveform bars
  const barW = W / waveformPeaks.length;
  for (let i = 0; i < waveformPeaks.length; i++) {
    const x    = i * barW;
    const barH = waveformPeaks[i] * H * 0.85;
    const y    = (H - barH) / 2;
    ctx.fillStyle = (x >= sx && x <= ex) ? '#d4a017' : '#2a2a2a';
    ctx.fillRect(x, y, Math.max(barW - 1, 1), barH);
  }

  // Dim mask outside selection
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0,  0, sx,     H);
  ctx.fillRect(ex, 0, W - ex, H);

  // Selection top & bottom border
  ctx.strokeStyle = 'rgba(212,160,23,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx, 0); ctx.lineTo(ex, 0);
  ctx.moveTo(sx, H); ctx.lineTo(ex, H);
  ctx.stroke();

  // ── Start handle ──
  const g1 = ctx.createLinearGradient(sx - 6, 0, sx + 6, 0);
  g1.addColorStop(0,   'rgba(212,160,23,0)');
  g1.addColorStop(0.5, '#d4a017');
  g1.addColorStop(1,   'rgba(212,160,23,0)');
  ctx.fillStyle = g1;
  ctx.fillRect(sx - 6, 0, 12, H);

  ctx.fillStyle = '#d4a017';
  ctx.fillRect(sx - 5, 0,     10, 4);
  ctx.fillRect(sx - 5, H - 4, 10, 4);

  ctx.fillStyle = 'white';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('◀', sx, H / 2);

  // ── End handle ──
  const g2 = ctx.createLinearGradient(ex - 6, 0, ex + 6, 0);
  g2.addColorStop(0,   'rgba(212,160,23,0)');
  g2.addColorStop(0.5, '#d4a017');
  g2.addColorStop(1,   'rgba(212,160,23,0)');
  ctx.fillStyle = g2;
  ctx.fillRect(ex - 6, 0, 12, H);

  ctx.fillStyle = '#d4a017';
  ctx.fillRect(ex - 5, 0,     10, 4);
  ctx.fillRect(ex - 5, H - 4, 10, 4);

  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.fillText('▶', ex, H / 2);

  // ── Playhead ──
  if (duration > 0) {
    const px = Math.round((audioPlayer.currentTime / duration) * W);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(px - 1, 0, 2, H);

    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(px - 5, 0);
    ctx.lineTo(px + 5, 0);
    ctx.lineTo(px, 9);
    ctx.closePath();
    ctx.fill();
  }
}

function startRaf() {
  if (rafId) cancelAnimationFrame(rafId);
  function loop() {
    drawCanvas();
    rafId = requestAnimationFrame(loop);
  }
  loop();
}

// ── Inputs sync ─────────────────────────────────────
function updateInputs() {
  startInput.max   = duration.toFixed(2);
  endInput.max     = duration.toFixed(2);
  startInput.value = startTime.toFixed(2);
  endInput.value   = endTime.toFixed(2);
}

startInput.addEventListener('change', () => {
  let v = parseFloat(startInput.value);
  if (isNaN(v)) v = 0;
  startTime = Math.max(0, Math.min(v, endTime - 0.05));
  updateInputs();
});

endInput.addEventListener('change', () => {
  let v = parseFloat(endInput.value);
  if (isNaN(v)) v = duration;
  endTime = Math.min(duration, Math.max(v, startTime + 0.05));
  updateInputs();
});

// ── Canvas interaction ──────────────────────────────
function xToTime(x) {
  return Math.max(0, Math.min(duration, (x / canvas.width) * duration));
}

function hitTest(x) {
  const sx = (startTime / duration) * canvas.width;
  const ex = (endTime   / duration) * canvas.width;
  if (Math.abs(x - sx) < 14) return 'start';
  if (Math.abs(x - ex) < 14) return 'end';
  return null;
}

// Mouse
canvas.addEventListener('mousedown', (e) => {
  const x   = e.offsetX;
  const hit = hitTest(x);
  if (hit) {
    isDragging = hit;
  } else {
    audioPlayer.currentTime = Math.max(startTime, Math.min(endTime, xToTime(x)));
  }
});

canvas.addEventListener('mousemove', (e) => {
  const x = e.offsetX;
  if (isDragging) {
    const t = xToTime(x);
    if (isDragging === 'start') {
      startTime = Math.max(0,        Math.min(t, endTime - 0.05));
    } else {
      endTime   = Math.min(duration, Math.max(t, startTime + 0.05));
    }
    updateInputs();
  } else {
    canvas.style.cursor = hitTest(x) ? 'ew-resize' : 'pointer';
  }
});

canvas.addEventListener('mouseup',    () => { isDragging = null; });
canvas.addEventListener('mouseleave', () => { isDragging = null; });

// Touch
function touchX(e) {
  const rect = canvas.getBoundingClientRect();
  return (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const x   = touchX(e);
  const hit = hitTest(x);
  if (hit) {
    isDragging = hit;
  } else {
    audioPlayer.currentTime = Math.max(startTime, Math.min(endTime, xToTime(x)));
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDragging) return;
  const t = xToTime(touchX(e));
  if (isDragging === 'start') {
    startTime = Math.max(0,        Math.min(t, endTime - 0.05));
  } else {
    endTime   = Math.min(duration, Math.max(t, startTime + 0.05));
  }
  updateInputs();
}, { passive: false });

canvas.addEventListener('touchend', () => { isDragging = null; });

// ── File input ──────────────────────────────────────
uploadZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadAudio(file);
});

// ── Drag & drop ─────────────────────────────────────
uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});

uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('dragover');
});

uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadAudio(file);
});

// ── Recording ────────────────────────────────────────
recordBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  try {
    const stream   = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];

    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
    mediaRecorder  = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      recordBtn.classList.remove('recording');
      recordIcon.textContent = '🎤';
      recordText.textContent = 'Enregistrer';
      const blob = new Blob(recordedChunks, { type: mimeType });
      await loadAudio(blob);
    };

    mediaRecorder.start();
    recordBtn.classList.add('recording');
    recordIcon.textContent = '⏹';
    recordText.textContent = 'Arrêter';
  } catch {
    alert('Impossible d\'accéder au microphone. Vérifiez les autorisations.');
  }
});

// ── Loop playback ────────────────────────────────────
audioPlayer.addEventListener('timeupdate', () => {
  if (duration && audioPlayer.currentTime >= endTime) {
    audioPlayer.currentTime = startTime;
  }
});

audioPlayer.addEventListener('ended', () => {
  audioPlayer.currentTime = startTime;
  audioPlayer.play().catch(() => {});
});

// ── Speed control ────────────────────────────────────
function setSpeed(rate) {
  audioPlayer.playbackRate = rate;
  speedSlider.value = rate;
  speedValue.textContent = rate + '×';
  speedPresets.forEach(btn => {
    btn.classList.toggle('active', parseFloat(btn.dataset.speed) === rate);
  });
}

speedSlider.addEventListener('input', () => {
  const rate = parseFloat(speedSlider.value);
  setSpeed(rate);
});

speedPresets.forEach(btn => {
  btn.addEventListener('click', () => setSpeed(parseFloat(btn.dataset.speed)));
});

// ── Resize ───────────────────────────────────────────
window.addEventListener('resize', () => {
  if (audioBuffer) setupCanvas();
});
</script>
